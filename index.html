<!DOCTYPE html>
<html lang="en">
<head>
    <title>notetty</title>
    <link rel="stylesheet" href="indexstyle.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="terminalCont">
        <div class="terminalPrompt">
            <textarea class="userInput" id="textBox" autocomplete="off" autofocus rows="1"></textarea>
        </div>
    </div>

    <div id="escUn"> 
        <div class="escCont" id="escContr">
            <div class="escBg"></div>
            <div class="escMenu">
                <span class="escBtn">save placeholder</span> 
                <span class="escBtn">open placeholder</span> 
                <span class="escBtn" id="colPick">pick theme</span>
            </div>
        </div>
    </div>

    <script>
        const escUn = document.getElementById("escUn");
        escUn.tabIndex = -1
        const textBox = document.getElementById("textBox");

        window.addEventListener("keydown", function(e) {
            if (e.key === "Escape") {
                const isVisible = escUn.classList.toggle("visible")
                e.preventDefault()
                if (isVisible) {
                    escUn.focus();
                    textBox.blur();
                    console.log(document.activeElement);
                } else {
                    console.log(document.activeElement);
                    textBox.focus();
                }
            }
        });

        textBox.addEventListener("input", function(e) {
            console.log("detect success");
            textBox.style.height = "auto";
            textBox.style.height = textBox.scrollHeight + "px";
            console.log(textBox.style.height);
        });
    </script>
</body>
</html>
