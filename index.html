<!DOCTYPE html>
<html lang="en">
<head>
    <title>notetty</title>
    <link rel="stylesheet" href="indexstyle.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="textCont">
        <div class="textPrompt">
            <textarea class="userInput" id="textBox" autocomplete="off" autofocus rows="1"></textarea>
        </div>
    </div>

    <div id="escUn"> 
        <div class="escCont" id="escContr">
            <div class="escBg"></div>
            <div class="escMenu">
                <button class="uBtn" id="saveBtn" onclick="saveFile()">save text file</button> 
                <button class="uBtn" id="openBtn" onclick="redirectOpen()">open text file</button> 
                <input type="file" id="openInput" accept=".txt" style="display: none;"/>
                <button class="uBtn" id="colPick" onclick="test()">pick theme</button>
                <button class="uBtn" id="fontChange" onclick="fontUI()">change font</button>
            </div>
            <div class="fontCont" id="fontCont">
                <button class="uBtn" id="fileUp" onclick="redirectUpload()">upload file</button>
                <input type="file" id="realUp" accept=".ttf, .otf, .woff, .woff2" style="display: none;"/>  
                <input type="text" id="fontLink" placeholder="enter font link..."/>
                <button class="uBtn" id="fontBtn" type="submit">confirm link</button>
                <input type="range" min="0.4" max="1.6" step="0.1" value="1.2" placeholder="font size" class="sizeSlider" id="slider"/>
            </div>
        </div>
    </div>

    <script>
        const escUn = document.getElementById("escUn");
        escUn.tabIndex = -1
        const textBox = document.getElementById("textBox");
        const fontCont = document.getElementById("fontCont");
        const uplBtn = document.getElementById("fileUp");
        const uplInput = document.getElementById("realUp");
        const fileUpload = document.getElementById("realUp");
        const fontLink = document.getElementById("fontLink");
        const fontBtn = document.getElementById("fontBtn");
        const fontSlider = document.getElementById("slider");
        const openBtn = document.getElementById("openBtn");
        const openInput = document.getElementById("openInput");
        const saveBtn = document.getElementById("saveBtn");
        const textArea = document.getElementById("textBox");
        // var outp = document.getElementById("demo");
        // outp.innerHTML = fontSlider.value;

        window.addEventListener("keydown", function(e) {
            if (e.key === "Escape") {
                const isEscVisible = escUn.classList.toggle("visible");
                e.preventDefault()
                if (isEscVisible) {
                    escUn.focus();
                    textBox.blur();
                    textBox.tabIndex = -1
                    console.log(document.activeElement);
                } else {
                    textBox.focus();
                    escUn.tabIndex = -1
                    console.log(document.activeElement);
                }
            }
        });

        textBox.addEventListener("input", function(e) {
            textBox.style.height = "auto";
            textBox.style.height = textBox.scrollHeight + "px";
        });

        function test() {
            console.log("button pressed");  
        }

        function redirectOpen() {
            openInput.click();
        }

        function redirectUpload() {
            uplInput.click();
        }

        function fontUI() {
            const isFCVisible = fontCont.classList.toggle("visible");
            console.log("font buton");
        }

        fontBtn.addEventListener("click", function(e) {
            e.preventDefault();
            const fontText = fontLink.value;
            uploadedFont = fontText.trim();
            console.log("submitted link:", uploadedFont);
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = uploadedFont;
            document.head.appendChild(link);
            const shortUrl = new URL(uploadedFont);
            const familyName = shortUrl.searchParams.get("family");
            const family = familyName.replaceAll("+", " ");
            document.documentElement.style.setProperty("--custom-font", `${family}, monospace`);
            fontLink.value = '';
        });
        fontLink.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                const fontText = fontLink.value;
                uploadedFont = fontText.trim();
                console.log("submitted link:", uploadedFont);
                const link = document.createElement("link");
                link.rel = "stylesheet";
                link.href = uploadedFont;
                document.head.appendChild(link);
                const shortUrl = new URL(uploadedFont);
                const familyName = shortUrl.searchParams.get("family");
                const family = familyName.replaceAll("+", " ");
                document.documentElement.style.setProperty("--custom-font", `${family}, monospace`);
                fontLink.value = '';
            }
        });

        fontSlider.oninput = function() {
            document.documentElement.style.setProperty("--custom-fSize", this.value +"rem");
            // outp.innerHTML = this.value;
        }

        openInput.addEventListener("change", handleFile);
        fileUpload.addEventListener("change", handleFile);

        function handleFile(event) {
            const file = event.target.files[0];

            if (file) {
                const fileName = file.name;    
                const fileExt = fileName.split(".").pop().toLowerCase();
                if (fileExt == "txt") {
                    console.log("text name: ", fileName);
                    const fileReader = new FileReader();
                    fileReader.onload = () => {
                        console.log("fR init");
                        console.log("file: ", fileReader.result);
                        textBox.value = fileReader.result;
                        textBox.style.height = "auto";
                        textBox.style.height = textBox.scrollHeight + "px";
                    }
                    fileReader.readAsText(file);
                } else if (["ttf", "otf", "woff", "woff2"].includes(fileExt)) {
                    console.log("font name: ", fileName);
                    const fileReader = new FileReader();
                    fileReader.onload = () => {
                        console.log("fR init");
                        const fontDataURL = fileReader.result;
                        const style = document.createElement("style");
                        style.innerHTML = `
                        @font-face {
                        font-family: "UploadedFont";
                        src: url("${fontDataURL}");
                        }`;
                        document.head.appendChild(style);
                        document.documentElement.style.setProperty("--custom-font", '"UploadedFont", monospace');
                    }
                    fileReader.readAsDataURL(file);
                }
            }
        }

        function saveFile() {
            let valueInput = textArea.value;
            let blobMIME = new Blob([valueInput], { type: "text/plain" });
            let url = URL.createObjectURL(blobMIME);
            let elem = document.createElement("a")
            elem.setAttribute("download", "note.txt");
            elem.href = url;
            elem.click();
            console.log(blobMIME)
        }
    </script>
</body>
</html>
