<!DOCTYPE html>
<html lang="en">
<head>
    <title>.note</title>
    <link rel="stylesheet" href="indexstyle.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="textCont">
        <div class="textPrompt">
            <div class="userInput" id="textBox" spellcheck="false" contenteditable="true" placeholder="enter text here | ctrl b to bold | ctrl i to italics | ctrl u to underline" autofocus></div>
        </div>
    </div>

    <div id="escUn"> 
        <div class="escCont" id="escContr">
            <div class="escBg"></div>
            <div class="escMenu">
                <button class="uBtn" id="saveBtn" onclick="saveFile()">save file</button> 
                <button class="uBtn" id="openBtn" onclick="redirectOpen()">open file</button> 
                <input type="file" id="openInput" accept=".txt, .html" style="display: none;"/>
                <button class="uBtn" id="colPick" onclick="colorGUI()">theme</button>
                <div class="colorCont" id="colorCont">
                    <div class="cBRow">
                        <button class="cBtn" id="dark" onclick="darkTheme()"> </button>
                        <button class="cBtn" id="light" onclick="lightTheme()"> </button>
                    </div>    
                    <div class="cRow">
                        <div class="textRow">
                            <span class="mainC">main - </span>
                            <p id="mainCol">#1f1f1f</p>
                        </div>
                        <input type="color" id="mainbg" value="#000000">
                    </div>
                    <div class="cRow">
                        <div class="textRow">
                            <span class="textC">text - </span>
                            <p id="textCol">#ffffff</p>
                        </div>
                        <input type="color" id="textColor" value="#ffffff">
                    </div>
                    <div class="cRow">
                        <div class="textRow">
                            <span class="accentC">accent % - </span>
                            <p id="accentCol">#77767b4d</p>
                        </div>
                        <input type="color" id="accentColor" value="#000000"><br>
                        <span class="accentC">accent opacity</span>
                        <input type="range" min="0" max="100" step="10" value="80" placeholder="accent opacity" class="accentOpacity" id="accentOpacity"/>
                    </div>
                </div>
                <button class="uBtn" id="fontChange" onclick="fontUI()">text settings</button>
                <div class="fontCont" id="fontCont">
                    <button class="uBtn" id="fileUp" onclick="redirectUpload()">upload file</button>
                    <input type="file" id="realUp" accept=".ttf, .otf, .woff, .woff2" style="display: none;"/>  
                    <input type="text" id="fontLink" placeholder="enter font link..."/>
                    <button class="uBtn" id="fontBtn" type="submit">confirm link</button>
                    <div class="sliderGroup">
                        <span class="fSize">font size</span><p id="sizeValue">1.2</p>
                        <input type="range" min="0.8" max="1.6" step="0.1" value="1.2" placeholder="font size" class="sizeSlider" id="sliderSize"/>
                    </div>

                    <div class="sliderGroup">
                        <span class="fWeight">font weight</span><p id="weightValue">350</p>
                        <input type="range" min="100" max="1000" step="50" value="350" placeholder="font weight" class="sliderWeight" id="sliderWeight"/>
                        <p class="fInfo">font weight might be fixed for some fonts.</p>
                    </div>

                    <div class="toggleSpell">
                        <p class="spellCheck">spellcheck</p>
                        <label class="switch">
                            <input type="checkbox" id="spellTick"> 
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <button class="uBtn" id="resetBtn" onclick="resetText()">reset text</button>
            </div>
        </div>
    </div>

    <script>
        const defConfig = {
            fontFamily: '"JetBrains Mono", monospace',
            fontSize: '1.2rem',
            fontWeight: '300',
            bgColor: "#1f1f1f",
            fgColor: "#77767b4d",
            textColor: "#ffffff",
            spellcheckActive: false
        }
        let appConfig = { ...defConfig };
        const escUn = document.getElementById("escUn");
        escUn.tabIndex = -1
        const textBox = document.getElementById("textBox");
        const fontCont = document.getElementById("fontCont");
        const fileUp = document.getElementById("fileUp");
        const realUp = document.getElementById("realUp");
        const fontLink = document.getElementById("fontLink");
        const fontBtn = document.getElementById("fontBtn");
        const sliderSize = document.getElementById("sliderSize");
        const openBtn = document.getElementById("openBtn");
        const openInput = document.getElementById("openInput");
        const saveBtn = document.getElementById("saveBtn");
        const sliderWeight = document.getElementById("sliderWeight");
        const sizeValue = document.getElementById("sizeValue");
        const weightValue = document.getElementById("weightValue");
        const colorCont = document.getElementById("colorCont");
        const dark = document.getElementById("dark");
        const light= document.getElementById("light");
        const mainCol = document.getElementById("mainCol");
        const textCol = document.getElementById("textCol");
        const accentCol = document.getElementById("accentCol");
        const mainbg = document.getElementById("mainbg");
        const textColor = document.getElementById("textColor");
        const accentColor = document.getElementById("accentColor");
        const accentOpacity = document.getElementById("accentOpacity");
        const spellTick = document.getElementById("spellTick");
        const resetBtn = document.getElementById("resetBtn");
        let opacity;


        function syncUI() {
            if (textBox) {
                textBox.spellcheck = appConfig.spellcheckActive;
            }
            if (spellTick) {
                spellTick.checked = appConfig.spellcheckActive;
            }
            if (sliderSize) {
                sliderSize.value = parseFloat(appConfig.fontSize);
            }
            if (sliderWeight) {
                sliderWeight.value = appConfig.fontWeight;
            }
            if (weightValue) {
                weightValue.content = appConfig.fontWeight;
            }
            if (mainbg) {
                mainbg.value = appConfig.bgColor;
            }
            if (textColor) {
                textColor.value = appConfig.textColor;
            }
            if (accentColor) {
                accentColor.value = appConfig.fgColor;
            }

            const rootStyle = document.documentElement.style;
            rootStyle.setProperty("--custom-font", appConfig.fontFamily);
            rootStyle.setProperty("--custom-fSize", appConfig.fontSize);
            rootStyle.setProperty("--custom-weight", appConfig.fontWeight);
            rootStyle.setProperty("--custom-color", appConfig.bgColor);
            rootStyle.setProperty("--custom-fColor", appConfig.textColor);
            rootStyle.setProperty("--custom-accent", appConfig.fgColor);

            console.log("sync yay");
        }

        document.addEventListener("DOMContentLoaded", function(e) {
            syncUI();
        })

        textBox.addEventListener("input", (e) => {
            if (e.target.innerText.trim() === "") {
                e.target.innerHTML = ''; 
            }
        })

         textBox.addEventListener("keydown", function(e) {
            const ctrlKey = e.ctrlKey || e.metaKey;
            if (ctrlKey) {
                switch(e.key.toLowerCase()) {
                
                case "b":
                    e.preventDefault();
                    document.execCommand("bold", false, null);
                    break;
                case "i":
                    e.preventDefault();
                    document.execCommand("italic", false, null);
                    break;
                case "u":
                    e.preventDefault();
                    document.execCommand("underline", false, null);
                    break;
                }
            }
        }); 

        textBox.addEventListener("paste", function(e) {
            e.preventDefault();
            const cleanText = (e.originalEvent || e).clipboardData.getData("text/plain");
            document.execCommand("insertText", false, cleanText);
        });

        function caretEnd() {
            textBox.focus();
            const range = document.createRange();
            const selection = window.getSelection();
            range.selectNodeContents(textBox);
            range.collapse(false);
            selection.removeAllRanges();
            selection.addRange(range);
        }

        spellTick.addEventListener("change", function(e) {
            textBox.spellcheck = this.checked;
        });

        function darkTheme() {
            document.documentElement.style.setProperty("--custom-color", "#1f1f1f");
            document.documentElement.style.setProperty("--custom-fColor", "white");
            document.documentElement.style.setProperty("--custom-accent", "#77767b4d");
            mainCol.textContent = "#1f1f1f";
            textCol.textContent = "#ffffff";
            accentCol.textContent = "#77767b4d";
        }

        function lightTheme() {
            document.documentElement.style.setProperty("--custom-color", "white");
            document.documentElement.style.setProperty("--custom-fColor", "#1f1f1f");
            document.documentElement.style.setProperty("--custom-accent", "#77767b4d");
            mainCol.textContent = "#000000";
            textCol.textContent = "#1f1f1f";
            accentCol.textContent = "#77767b4d";
        }

        function resetText() {
            textBox.innerHTML = "";
        }

//abushamaniazi - .note    
        window.addEventListener("keydown", function(e) {
            if (e.key === "Escape") {
                const isEscVisible = escUn.classList.toggle("visible");
                e.preventDefault()
                if (isEscVisible) {
                    escUn.focus();
                    textBox.blur();
                    textBox.tabIndex = -1
                } else {
                    textBox.focus();
                    escUn.tabIndex = -1
                    setTimeout(caretEnd, 10);
                }
            }
        });

        function test() {
            console.log("button pressed");  
        }

        function redirectOpen() {
            openInput.click();
        }

        function redirectUpload() {
            realUp.click();
        }

        function colorGUI() {
            fontCont.classList.remove("visible");
            colorCont.classList.toggle("visible");
        }

        function fontUI() {
            colorCont.classList.remove("visible");
            fontCont.classList.toggle("visible");
        }

        fontBtn.addEventListener("click", function(e) {
            e.preventDefault();
            const fontText = fontLink.value.trim();
            if (!fontText) return;

            try {
                const shortUrl = new URL(fontText);
                if (shortUrl.protocol !== "https:") {
                    alert("only https links allowed, security purposes");
                    return;
                }

                const allowedCDNs = ["fonts.googleapis.com", "fonts.gstatic.com", "cdnjs.cloudflare.com", "fastly.jsdelivr.net"];
                const isTrusted = allowedCDNs.some(cdn => shortUrl.hostname.endsWith(cdn));

                if (!isTrusted) {
                    const proceed = confirm("warning: this font link is hosted on an unverified external server. proceed?");
                    if (!proceed) return;
                }

                const link = document.createElement("link");    
                link.rel = "stylesheet";
                link.href = shortUrl.toString();
                document.head.appendChild(link);
                const familyName = shortUrl.searchParams.get("family");
                if (familyName) {
                    const baseName = familyName.split(":")[0];
                    const family = baseName.replaceAll("+", " ");
                    shortUrl.searchParams.set("family", baseName);
                    document.documentElement.style.setProperty("--custom-font", `'${family}', monospace`);
                }
            } catch(err) {
                alert("invalid url");
                console.log("error: ", err);
            }
            fontLink.value = '';
        });
        fontLink.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
            const fontText = fontLink.value.trim();
            if (!fontText) return;

            try {
                const shortUrl = new URL(fontText);
                if (shortUrl.protocol !== "https:") {
                    alert("only https links allowed, security purposes");
                    return;
                }

                const allowedCDNs = ["fonts.googleapis.com", "fonts.gstatic.com", "cdnjs.cloudflare.com", "fastly.jsdelivr.net"];
                const isTrusted = allowedCDNs.some(cdn => shortUrl.hostname.endsWith(cdn));

                if (!isTrusted) {
                    const proceed = confirm("warning: this font link is hosted on an unverified external server. proceed?");
                    if (!proceed) return;
                }

                const link = document.createElement("link");    
                link.rel = "stylesheet";
                link.href = shortUrl.toString();
                document.head.appendChild(link);
                const familyName = shortUrl.searchParams.get("family");
                if (familyName) {
                    const baseName = familyName.split(":")[0];
                    const family = baseName.replaceAll("+", " ");
                    shortUrl.searchParams.set("family", baseName);
                    document.documentElement.style.setProperty("--custom-font", `'${family}', monospace`);
                }
            } catch(err) {
                alert("invalid url");
                console.log("error: ", err);
            }
            fontLink.value = '';
            }
        });

        sliderSize.oninput = function() {
            document.documentElement.style.setProperty("--custom-fSize", this.value +"rem");
            sizeValue.textContent = this.value;
        }

        sliderWeight.oninput = function() {
            document.documentElement.style.setProperty("--custom-weight", this.value);
            weightValue.textContent = this.value;
        }

        openInput.addEventListener("change", handleFile);
        realUp.addEventListener("change", handleFile);

        function handleFile(event) {
            const file = event.target.files[0];

            if (file) {
                const fileName = file.name;    
                const fileExt = fileName.split(".").pop().toLowerCase();
                if (fileExt == "txt") {
                    const fileReader = new FileReader();
                    fileReader.onload = () => {
                        textBox.innerText = fileReader.result;
                    }
                    fileReader.readAsText(file);
                } else if (["ttf", "otf", "woff", "woff2"].includes(fileExt)) {
                    const fileReader = new FileReader();
                    fileReader.onload = () => {
                        const fontDataURL = fileReader.result;
                        const style = document.createElement("style");
                        style.innerHTML = `
                        @font-face {
                        font-family: "UploadedFont";
                        src: url("${fontDataURL}");
                        }`;
                        document.head.appendChild(style);
                        document.documentElement.style.setProperty("--custom-font", '"UploadedFont", monospace');
                    }
                    fileReader.readAsDataURL(file);
                } else if (fileExt == "html") {
                    const fileReader = new FileReader();
                    fileReader.onload = () => {
                        if (typeof textBox.setHTML === "function") {
                            textBox.setHTML(fileReader.result);
                        } else {
                            const template = document.createElement("template");
                            template.innerHTML = fileReader.result;
                            const scripts = template.content.querySelectorAll("script, iframe, object, embed");
                            scripts.forEach(s => s.remove());
                            const allNodes = template.content.querySelectorAll("*");
                            allNodes.forEach(node => {
                                for (let i = node.attributes.length - 1; i >= 0; i--) {
                                    if (node.attributes[i].name.startsWith("on")) {
                                        node.removeAttribute(node.attributes[i].name);
                                    }
                                }
                            });
                            textBox.innerHTML = "";
                            textBox.appendChild(template.content);
                        }
                        setTimeout(caretEnd, 10);
                    }
                    fileReader.readAsText(file);
                }
            }
        };

        function saveFile() {
            let valueInput = textBox.innerHTML;
            let blobMIME = new Blob([valueInput], { type: "text/html" });
            let url = URL.createObjectURL(blobMIME);
            let elem = document.createElement("a")
            elem.setAttribute("download", "note.html");
            elem.href = url;
            elem.click();
            URL.revokeObjectURL(url);
            console.log(blobMIME);
        }

        document.addEventListener("keydown", function(e) {
            const ctrlKey = e.ctrlKey || e.metaKey;
            if (ctrlKey) {
                if(e.key.toLowerCase() === "s") {
                    e.preventDefault();
                    saveFile();
                } else if (e.key.toLowerCase() === "o") {
                    e.preventDefault();
                    openInput.click();
                    console.log("file open");
                }
            }
        })

        function accentUpdate() {
            const hexColor = accentColor.value;
            const opacityPercent = accentOpacity.value;

            accentCol.textContent = hexColor;
            let alphaValue = Math.round(opacityPercent * 2.55);
            let alphaHex = alphaValue.toString(16).padStart(2, '0');
            let finalAccent = hexColor + alphaHex;

            accentCol.textContent = finalAccent;
            document.documentElement.style.setProperty("--custom-accent", finalAccent);
        }

        mainbg.addEventListener("input", function() {
            mainCol.textContent = this.value;
            document.documentElement.style.setProperty("--custom-color", this.value);
        })
        textColor.addEventListener("input", function() {
            textCol.textContent = this.value;
            document.documentElement.style.setProperty("--custom-fColor", this.value);
        })
        accentColor.addEventListener("input", accentUpdate);
        accentOpacity.addEventListener("input", accentUpdate);
    </script>
</body>
</html>
